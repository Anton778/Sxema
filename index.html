<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Splan Pro - Full Version</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #111; color: white; overflow: hidden; }
        #sidebar { width: 240px; background: #1a1a1a; padding: 15px; border-right: 1px solid #444; z-index: 10; display: flex; flex-direction: column; }
        .btn { background: #333; color: #eee; padding: 10px; text-align: center; cursor: pointer; border: 1px solid #555; border-radius: 4px; font-size: 13px; margin-bottom: 8px; user-select: none; }
        .btn:hover { background: #444; border-color: #3498db; }
        .btn.active { background: #3498db; border-color: #fff; }
        .btn.delete { background: #c0392b; border-color: #a93226; margin-top: 10px; }
        .props { background: #222; padding: 10px; border-radius: 4px; border: 1px solid #444; margin-top: 10px; display: none; }
        #main { flex-grow: 1; display: flex; flex-direction: column; background: #222; position: relative; }
        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; }
        canvas { background: #111; }
        #footer { height: 140px; background: #1a1a1a; padding: 15px; border-top: 1px solid #444; }
        textarea { width: 100%; height: 70px; background: #000; color: #00ff00; border: 1px solid #333; font-family: 'Consolas', monospace; font-size: 12px; padding: 10px; box-sizing: border-box; }
        input, select { width: 100%; background: #333; border: 1px solid #555; color: white; padding: 5px; margin-top: 5px; box-sizing: border-box; }
        label { font-size: 12px; color: #888; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="btn active" id="mode-move" onclick="setMode('move')">Выбор / Перенос</div>
    <div class="btn" id="mode-wire" onclick="setMode('wire')">Провод (Орто)</div>
    <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
    <div class="btn" onclick="addComponent('resistor')">Резистор</div>
    <div class="btn" onclick="addComponent('capacitor')">Конденсатор</div>
    <div class="btn" onclick="addComponent('node')">Узел</div>
    <div class="btn" onclick="addComponent('ground')">Общий провод</div>
    
    <label>Стиль LaTeX:</label>
    <select id="style-select" onchange="render()">
        <option value="european">European (Rectangle)</option>
        <option value="american">American (ZigZag)</option>
    </select>

    <div id="props-panel" class="props">
        <div style="font-size:10px; color:#888;">СВОЙСТВА ЭЛЕМЕНТА</div>
        <label>Метка:</label>
        <input type="text" id="label-edit" oninput="updateLabel(this.value)">
    </div>

    <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
    <div class="btn" style="background:#f39c12;" onclick="reorderLabels()">Перенумеровать элементы</div>
    <div class="btn delete" onclick="deleteSelected()">Удалить (Del)</div>
    <button onclick="generateLatex()" style="width:100%; padding:12px; background:#27ae60; color:white; border:none; cursor:pointer; font-weight:bold; border-radius:4px; margin-top:auto;">В LaTeX</button>
</div>

<div id="main">
    <div id="canvas-container"><canvas id="c"></canvas></div>
    <div id="footer"><textarea id="output" readonly placeholder="Здесь будет код для LaTeX..."></textarea></div>
</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvas-container');
    const sheetWidth = 800, sheetHeight = 1000, gridSize = 20;

    let elements = [], wires = [];
    let mode = 'move', isDragging = false, isPanning = false, isWiring = false;
    let selectedObj = null, lastMousePos = {x:0, y:0}, wireStart = null, tempWireEnd = null;
    let scale = 0.8, offsetX = 50, offsetY = 50;
    let dragOffset = {x: 0, y: 0};

    function setMode(m) { mode = m; document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); if(document.getElementById('mode-' + m)) document.getElementById('mode-' + m).classList.add('active'); }

    function getAnchors(el) {
        if (!el) return [];
        if (el.type === 'node') return [{x: el.x, y: el.y, id: el.id, anchorIdx: 0}];
        if (el.type === 'ground') return [{x: el.x, y: el.y - 20, id: el.id, anchorIdx: 0}];
        if (el.type === 'resistor' || el.type === 'capacitor') {
            let v = el.angle % 180 !== 0;
            return [
                { x: el.x + (v?0:-40), y: el.y + (v?-40:0), id: el.id, anchorIdx: 0 },
                { x: el.x + (v?0:40), y: el.y + (v?40:0), id: el.id, anchorIdx: 1 }
            ];
        }
        return [];
    }

    function distToSegment(p, v, w) {
        let l2 = Math.pow(v.x-w.x, 2) + Math.pow(v.y-w.y, 2);
        if (l2 == 0) return Math.hypot(p.x-v.x, p.y-v.y);
        let t = Math.max(0, Math.min(1, ((p.x-v.x)*(w.x-v.x) + (p.y-v.y)*(w.y-v.y)) / l2));
        return Math.hypot(p.x-(v.x+t*(w.x-v.x)), p.y-(v.y+t*(w.y-v.y)));
    }

    function getWirePoints(w) {
        let p1 = w.startEl ? getAnchors(elements.find(e => e.id === w.startEl))[w.startIdx] : {x:w.x1, y:w.y1};
        let p2 = w.endEl ? getAnchors(elements.find(e => e.id === w.endEl))[w.endIdx] : {x:w.x2, y:w.y2};
        return {p1, p2};
    }

    function render() {
        const style = document.getElementById('style-select').value;
        ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, sheetWidth, sheetHeight);
        ctx.fillStyle = "#ddd";
        for(let x=0; x<=sheetWidth; x+=gridSize) for(let y=0; y<=sheetHeight; y+=gridSize) { ctx.beginPath(); ctx.arc(x,y,1,0,7); ctx.fill(); }

        wires.forEach(w => {
            const {p1, p2} = getWirePoints(w);
            ctx.strokeStyle = (selectedObj === w) ? "#e74c3c" : "#000";
            ctx.lineWidth = (selectedObj === w) ? 3 : 1.5;
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y);
            if (p1.x !== p2.x && p1.y !== p2.y) ctx.lineTo(p2.x, p1.y);
            ctx.lineTo(p2.x, p2.y); ctx.stroke();
        });

        if(isWiring && wireStart && tempWireEnd) {
            ctx.strokeStyle = "#3498db"; ctx.beginPath(); ctx.moveTo(wireStart.x, wireStart.y);
            if (wireStart.x !== tempWireEnd.x && wireStart.y !== tempWireEnd.y) ctx.lineTo(tempWireEnd.x, wireStart.y);
            ctx.lineTo(tempWireEnd.x, tempWireEnd.y); ctx.stroke();
        }

         elements.forEach(el => {
            ctx.save(); ctx.translate(el.x, el.y); 
            ctx.fillStyle = "#000"; ctx.font = "italic 14px Arial";
            if (typeof el.label === 'string') ctx.fillText(el.label, (el.angle % 180 !== 0) ? 25 : -10, (el.angle % 180 !== 0) ? 5 : -15);
            ctx.rotate((el.angle||0)*Math.PI/180);
            ctx.strokeStyle = (selectedObj === el) ? "#e74c3c" : "#000";
            ctx.lineWidth = (selectedObj === el) ? 3 : 2;
            
            if(el.type==='resistor') {
                // ВЫВОДЫ (теперь рисуются всегда)
                ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(-20,0); ctx.moveTo(20,0); ctx.lineTo(40,0); ctx.stroke();
                
                if(style === 'european') {
                    ctx.fillStyle='#fff'; ctx.fillRect(-20,-8,40,16); ctx.strokeRect(-20,-8,40,16);
                } else {
                    // Американский зигзаг
                    ctx.beginPath(); ctx.moveTo(-20,0); 
                    ctx.lineTo(-15,8); ctx.lineTo(-5,-8); ctx.lineTo(5,8); ctx.lineTo(15,-8); ctx.lineTo(20,0); ctx.stroke();
                }
            } else if(el.type==='capacitor') {
                // Выводы и обкладки конденсатора
                ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(-6,0); ctx.moveTo(40,0); ctx.lineTo(6,0);
                ctx.moveTo(-6,-15); ctx.lineTo(-6,15); ctx.moveTo(6,-15); ctx.lineTo(6,15); ctx.stroke();
            } else if(el.type==='node') { 
                ctx.fillStyle=ctx.strokeStyle; ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fill(); 
            } else if(el.type==='ground') { 
                ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,0); ctx.moveTo(-15,0); ctx.lineTo(15,0); ctx.stroke(); 
            }
            ctx.restore();
        });
    }

    function addComponent(t) { 
        let count = elements.filter(e => e.type === t).length + 1;
        let prefix = (t === 'resistor' ? "R" : (t === 'capacitor' ? "C" : (t === 'ground' ? "GND" : "")));
        elements.push({type:t, x:200, y:200, angle:0, id: Date.now(), label: prefix + (['node', 'ground'].includes(t) ? "" : count)}); 
        render(); 
    }

    function updateLabel(val) { if(selectedObj && selectedObj.type) { selectedObj.label = val; render(); } }
    
    function reorderLabels() { 
        ['resistor', 'capacitor'].forEach(type => {
            let pref = type === 'resistor' ? 'R' : 'C';
            elements.filter(e => e.type === type).sort((a,b) => (a.y-b.y)||(a.x-b.x)).forEach((el,i) => el.label = pref+(i+1));
        });
        render(); 
    }

    function getMousePos(e) { const r = canvas.getBoundingClientRect(); return { x:(e.clientX-r.left-offsetX)/scale, y:(e.clientY-r.top-offsetY)/scale }; }
    
    canvas.onmousedown = (e) => {
        const pos = getMousePos(e); lastMousePos = {x:e.clientX, y:e.clientY};
        if(e.button === 1) { isPanning = true; return; }
        if(mode === 'wire') {
            isWiring = true;
            let snap = null;
            elements.forEach(el => getAnchors(el).forEach(a => { if(Math.hypot(a.x-pos.x, a.y-pos.y) < 15) snap = a; }));
            wireStart = snap ? {x: snap.x, y: snap.y, elId: snap.id, idx: snap.anchorIdx} : { x: Math.round(pos.x/gridSize)*gridSize, y: Math.round(pos.y/gridSize)*gridSize, elId: null };
        } else {
            let found = elements.find(el => Math.hypot(el.x-pos.x, el.y-pos.y) < 25);
            if(!found) {
                found = wires.find(w => {
                    const {p1, p2} = getWirePoints(w);
                    const corner = {x: p2.x, y: p1.y};
                    return distToSegment(pos, p1, corner) < 10 || distToSegment(pos, corner, p2) < 10;
                });
            }
            selectedObj = found;
            document.getElementById('props-panel').style.display = (selectedObj && selectedObj.type) ? 'block' : 'none';
            if(selectedObj) {
                isDragging = true;
                if(selectedObj.type) {
                    document.getElementById('label-edit').value = selectedObj.label || "";
                    dragOffset = {x: pos.x - selectedObj.x, y: pos.y - selectedObj.y};
                    if(e.button === 2) selectedObj.angle = ((selectedObj.angle||0)+90)%360;
                } else {
                    dragOffset = {x: pos.x, y: pos.y};
                }
            }
            render();
        }
    };

    window.onmousemove = (e) => {
        const pos = getMousePos(e);
        if(isPanning) { offsetX += e.clientX-lastMousePos.x; offsetY += e.clientY-lastMousePos.y; lastMousePos = {x:e.clientX, y:e.clientY}; }
        else if(isWiring) tempWireEnd = { x: Math.round(pos.x/gridSize)*gridSize, y: Math.round(pos.y/gridSize)*gridSize };
        else if(isDragging && selectedObj) {
            if(selectedObj.type) {
                selectedObj.x = Math.max(0, Math.min(sheetWidth, Math.round((pos.x - dragOffset.x)/gridSize)*gridSize));
                selectedObj.y = Math.max(0, Math.min(sheetHeight, Math.round((pos.y - dragOffset.y)/gridSize)*gridSize));
            } else {
                const dx = Math.round((pos.x - dragOffset.x)/gridSize)*gridSize;
                const dy = Math.round((pos.y - dragOffset.y)/gridSize)*gridSize;
                if(!selectedObj.startEl) { selectedObj.x1 += dx; selectedObj.y1 += dy; }
                if(!selectedObj.endEl) { selectedObj.x2 += dx; selectedObj.y2 += dy; }
                dragOffset = {x: pos.x, y: pos.y};
            }
        }
        render();
    };

    window.onmouseup = () => {
        if(isWiring && wireStart && tempWireEnd && (wireStart.x !== tempWireEnd.x || wireStart.y !== tempWireEnd.y)) {
            let snap = null;
            elements.forEach(el => getAnchors(el).forEach(a => { if(Math.hypot(a.x-tempWireEnd.x, a.y-tempWireEnd.y) < 15) snap = a; }));
            wires.push({x1:wireStart.x, y1:wireStart.y, startEl:wireStart.elId, startIdx:wireStart.idx, x2:tempWireEnd.x, y2:tempWireEnd.y, endEl:snap?snap.id:null, endIdx:snap?snap.anchorIdx:null});
        }
        isDragging = isPanning = isWiring = false; wireStart = tempWireEnd = null; render();
    };

    window.onkeydown = (e) => { 
        if (document.activeElement.tagName === 'INPUT') return;
        if(e.key === "Delete" || e.key === "Backspace") deleteSelected(); 
    };

    function deleteSelected() {
        if(!selectedObj) return;
        if(selectedObj.type) {
            wires.forEach(w => {
                if(w.startEl === selectedObj.id) { let a = getAnchors(selectedObj)[w.startIdx]; w.x1 = a.x; w.y1 = a.y; w.startEl = null; }
                if(w.endEl === selectedObj.id) { let a = getAnchors(selectedObj)[w.endIdx]; w.x2 = a.x; w.y2 = a.y; w.endEl = null; }
            });
            elements = elements.filter(el => el !== selectedObj);
        } else wires = wires.filter(w => w !== selectedObj);
        selectedObj = null; document.getElementById('props-panel').style.display='none'; render();
    }

      function generateLatex() {
        const style = document.getElementById('style-select').value;
        let code = "\\begin{circuitikz}[" + style + "]\n";
        
        // Сначала рисуем провода
        wires.forEach(w => {
            const {p1, p2} = getWirePoints(w);
            let x1 = (p1.x/40).toFixed(1), y1 = (-p1.y/40).toFixed(1), x2 = (p2.x/40).toFixed(1), y2 = (-p2.y/40).toFixed(1);
            if (x1 === x2 && y1 === y2) return;
            code += (x1 !== x2 && y1 !== y2) ? `  \\draw (${x1},${y1}) -| (${x2},${y2});\n` : `  \\draw (${x1},${y1}) -- (${x2},${y2});\n`;
        });

        // Рисуем элементы
        elements.forEach(el => {
            let lx = parseFloat((el.x/40).toFixed(1)), ly = parseFloat((-el.y/40).toFixed(1));
            let lbl = el.label ? `, l=${el.label}` : "";
            
            if(el.type==='resistor' || el.type==='capacitor') {
                let comp = el.type === 'resistor' ? 'R' : 'C';
                // Компоненту НУЖНЫ две точки. Мы берем +/- 1 единицу от центра.
                if(el.angle % 180 === 0) {
                    // Горизонтально
                    code += `  \\draw (${(lx-1).toFixed(1)},${ly}) to[${comp}${lbl}] (${(lx+1).toFixed(1)},${ly});\n`;
                } else {
                    // Вертикально
                    code += `  \\draw (${lx},${(ly+1).toFixed(1)}) to[${comp}${lbl}] (${lx},${(ly-1).toFixed(1)});\n`;
                }
            } else if(el.type==='node') {
    code += `  \\fill (${lx.toFixed(1)},${ly.toFixed(1)}) circle (2pt);\n`;
} else if(el.type==='ground') {
    // Сдвигаем точку рисования на 0.5 (20px / 40), так как в JS вывод смещен вверх
    let connectionY = (-(el.y - 20) / 40).toFixed(1); 
    code += `  \\draw (${lx.toFixed(1)},${connectionY}) node[rground]{};\n`;
}

        });
        document.getElementById('output').value = code + "\\end{circuitikz}";
    }

    container.onwheel = (e) => {
        e.preventDefault(); const zoom = 0.05, delta = e.deltaY > 0 ? -zoom : zoom, oldS = scale;
        scale = Math.min(Math.max(0.2, scale + delta), 4.0);
        const rect = canvas.getBoundingClientRect();
        offsetX -= (e.clientX - rect.left - offsetX) * (scale / oldS - 1);
        offsetY -= (e.clientY - rect.top - offsetY) * (scale / oldS - 1);
        render();
    };
    canvas.oncontextmenu = e => e.preventDefault();
    window.onload = () => { canvas.width = container.clientWidth; canvas.height = container.clientHeight; render(); };
</script>
</body>
</html>
